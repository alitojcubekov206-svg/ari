<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVIZOR_CYBER_QUIZ</title>
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00f2ff;
            --neon-yellow: #fcee0a;
            --dark-bg: #050505;
            --card-bg: rgba(20, 20, 25, 0.9);
        }

        body {
            background-color: var(--dark-bg);
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: white;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .quiz-container {
            background: var(--card-bg);
            width: 90%;
            max-width: 600px;
            padding: 40px;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2), inset 0 0 10px rgba(0, 242, 255, 0.1);
            border-radius: 0 40px 0 40px;
            position: relative;
        }

        .quiz-container::after {
            content: "SYSTEM_ACCESS_GRANTED";
            position: absolute;
            top: -15px;
            left: 20px;
            background: var(--neon-cyan);
            color: black;
            padding: 2px 10px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .progress-bar {
            height: 4px;
            background: #1a1a1a;
            margin-bottom: 30px;
            border-radius: 2px;
        }

        #progress-fill {
            height: 100%;
            background: var(--neon-pink);
            box-shadow: 0 0 15px var(--neon-pink);
            width: 0%;
            transition: 0.5s;
        }

        h2 {
            font-size: 1.2rem;
            color: var(--neon-yellow);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            border-left: 4px solid var(--neon-pink);
            padding-left: 15px;
        }

        .options {
            display: grid;
            gap: 15px;
        }

        .opt-btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 15px;
            text-align: left;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: 0.3s;
            clip-path: polygon(0% 0%, 95% 0%, 100% 30%, 100% 100%, 5% 100%, 0% 70%);
        }

        .opt-btn:hover {
            background: var(--neon-cyan);
            color: black;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .grade-num {
            font-size: 6rem;
            color: var(--neon-pink);
            text-shadow: 0 0 20px var(--neon-pink);
            margin: 20px 0;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .footer b {
            color: var(--neon-yellow);
            text-shadow: 0 0 5px var(--neon-yellow);
        }

        .hidden { display: none; }

        .review-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            margin-bottom: 10px;
            border-left: 2px solid var(--neon-pink);
            font-size: 0.8rem;
            text-align: left;
        }

        .btn-restart {
            margin-top: 20px;
            background: var(--neon-yellow);
            color: black;
            border: none;
            padding: 15px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 90% 100%, 0 100%);
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="game">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <h2 id="q-text">INITIALIZING...</h2>
        <div class="options" id="opt-container"></div>
    </div>

    <div id="results" class="hidden" style="text-align: center;">
        <h1 style="color:var(--neon-cyan)">LEVEL_COMPLETE</h1>
        <div class="grade-num" id="grade-num">5</div>
        <p id="grade-desc" style="color: var(--neon-yellow);"></p>
        <div id="detailed-review"></div>
        <button class="btn-restart" onclick="location.reload()">REBOOT_SYSTEM</button>
    </div>
</div>

<div class="footer">
    USER_ID: <b>АЛИ</b> // STATUS: DEVELOPER
</div>

<script>
    const quizData = [
        { q: "СУММА ВЗЯТКИ У ПОЧТМЕЙСТЕРА ШПЕКИНА?", a: ["200 CR", "300 CR", "400 CR", "100 CR"], c: 1 },
        { q: "ID СЛУГИ ХЛЕСТАКОВА?", a: ["ПЕТРУШКА", "СЕЛИФАН", "ОСИП", "ЗАХАР"], c: 2 },
        { q: "ДОНОС ЗЕМЛЯНИКИ: КТО ВОЛЬНОДУМЕЦ?", a: ["ГОРОДНИЧИЙ", "ЛЯПКИН-ТЯПКИН", "ХЛОПОВ", "БОБЧИНСКИЙ"], c: 1 },
        { q: "ПЕРВЫЙ КОНТАКТ: КТО ЗАМЕТИЛ РЕВИЗОРА?", a: ["ОСИП", "ТРАКТИРЩИК", "БОБЧИНСКИЙ/ДОБЧИНСКИЙ", "ШПЕКИН"], c: 2 },
        { q: "ОБВИНЕНИЕ ПОШЛЕПКИНОЙ:", a: ["КРАЖА ДАННЫХ", "НЕЗАКОННЫЙ ПРИЗЫВ МУЖА", "КОРРУПЦИЯ", "ПОРКА"], c: 1 },
        { q: "ЦЕНА АРБУЗА В КРЕДИТАХ?", a: ["100", "500", "700", "1000"], c: 2 },
        { q: "ИМЯ ОБЪЕКТА: ДОЧЬ ГОРОДНИЧЕГО?", a: ["АННА", "МАРЬЯ", "ДАРЬЯ", "АВДОТЬЯ"], c: 1 },
        { q: "УПУЩЕННЫЙ ПРЕДМЕТ ХЛЕСТАКОВА?", a: ["ПЛАТОК", "КАРТУЗ", "ЧИП-ДАННЫХ", "ТРОСТЬ"], c: 0 },
        { q: "ДОЛЖНОСТЬ ЛУКИ ХЛОПОВА?", a: ["СЕТЕВОЙ АДМИН", "СМОТРИТЕЛЬ УЧИЛИЩ", "СУДЬЯ", "МЕДИК"], c: 1 },
        { q: "ФИНАЛЬНЫЙ СТАТУС СЦЕНЫ?", a: ["ТИХАЯ", "НЕМАЯ", "ERROR", "OFFLINE"], c: 1 }
    ];

    let current = 0;
    let score = 0;
    let userChoices = [];

    function loadQuestion() {
        const item = quizData[current];
        document.getElementById('q-text').textContent = `> ${item.q}`;
        document.getElementById('progress-fill').style.width = `${((current + 1) / 10) * 100}%`;
        const container = document.getElementById('opt-container');
        container.innerHTML = '';
        item.a.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.textContent = `[${idx}] ${opt}`;
            btn.onclick = () => { userChoices.push(idx); if(idx===item.c) score++; current++; if(current<10) loadQuestion(); else showFinal(); };
            container.appendChild(btn);
        });
    }

    function showFinal() {
        document.getElementById('game').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');
        let grade = 2; let desc = "";
        if (score >= 9) { grade = 5; desc = "ACCESS GRANTED. ТЫ ЛУЧШИЙ, АЛИ."; }
        else if (score >= 7) { grade = 4; desc = "CONNECTION STABLE. ХОРОШИЙ РЕЗУЛЬТАТ."; }
        else if (score >= 5) { grade = 3; desc = "SYSTEM WARNING. НУЖНО БОЛЬШЕ ДАННЫХ."; }
        else { grade = 2; desc = "CRITICAL ERROR. ТЫ ПРОИГРАЛ ХЛЕСТАКОВУ."; }
        document.getElementById('grade-num').textContent = grade;
        document.getElementById('grade-desc').textContent = desc;
        const review = document.getElementById('detailed-review');
        review.innerHTML = '<h3 style="color:var(--neon-pink)">LOG_DATA:</h3>';
        quizData.forEach((q, i) => {
            const ok = userChoices[i] === q.c;
            const div = document.createElement('div');
            div.className = `review-card`;
            div.innerHTML = `<span style="color:${ok ? 'var(--neon-cyan)' : 'var(--neon-pink)'}">${ok ? '✓' : '✗'}</span> ${q.q}`;
            review.appendChild(div);
        });
    }
    loadQuestion();
</script>

</body>
</html>
