<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ревизор: Экспертный уровень</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #22c55e;
            --error: #ef4444;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background: white;
            max-width: 700px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 30px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; color: var(--primary); font-size: 1.8rem; }
        
        .progress-bar {
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            margin-bottom: 25px;
        }
        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: 0.3s;
            border-radius: 3px;
        }

        .question-box h2 { font-size: 1.3rem; margin-bottom: 20px; line-height: 1.5; }

        .options { display: grid; gap: 12px; }
        .opt-btn {
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: 0.2s;
        }
        .opt-btn:hover { border-color: var(--primary); background: #f5f3ff; }

        .hidden { display: none; }

        /* Стили для итогов */
        .review-item {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid;
        }
        .correct-review { border-left-color: var(--success); background: #f0fdf4; }
        .wrong-review { border-left-color: var(--error); background: #fef2f2; }
        .review-q { font-weight: bold; margin-bottom: 5px; }
        .review-info { font-size: 0.9rem; }

        .restart-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-screen">
        <div class="header">
            <h1>Викторина «Ревизор»</h1>
        </div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div class="question-box">
            <h2 id="q-text">Загрузка вопроса...</h2>
            <div class="options" id="options-box"></div>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <div class="header">
            <h1>Ваш результат: <span id="final-score"></span></h1>
            <p id="rank-msg"></p>
        </div>
        <div id="review-list"></div>
        <button class="restart-btn" onclick="location.reload()">Попробовать снова</button>
    </div>
</div>

<script>
    const questions = [
        {
            q: "Что, по словам Земляники, 'человек простой: если умрет, то и так умрет; если выздоровеет, то и так выздоровеет'?",
            a: ["О пациентах больницы", "О чиновниках", "О своих детях", "О крепостных"],
            c: 0
        },
        {
            q: "Какое блюдо Хлестаков называет 'супом из Парижа'?",
            a: ["Борщ", "Лабардан", "Суп в кастрюльке прямо с парохода", "Щи"],
            c: 2
        },
        {
            q: "Сколько книг, по легенде, прочитал судья Ляпкин-Тяпкин?",
            a: ["Ни одной", "Пять или шесть", "Всю библиотеку", "Только кодекс"],
            c: 1
        },
        {
            q: "Какую фамилию носит полицейский, который 'для порядка ставит фонари под глазами'?",
            a: ["Держиморда", "Свистунов", "Пуговицын", "Уховертов"],
            c: 0
        },
        {
            q: "Кто из персонажей пьесы берет взятки 'борзыми щенками'?",
            a: ["Городничий", "Почтмейстер", "Судья", "Земляника"],
            c: 2
        }
    ];

    let currentIdx = 0;
    let userAnswers = [];

    function init() {
        const q = questions[currentIdx];
        document.getElementById('q-text').textContent = q.q;
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        
        // Обновляем прогресс-бар
        document.getElementById('progress-fill').style.width = `${(currentIdx / questions.length) * 100}%`;

        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.textContent = opt;
            btn.onclick = () => selectAnswer(i);
            box.appendChild(btn);
        });
    }

    function selectAnswer(idx) {
        userAnswers.push(idx);
        currentIdx++;
        if (currentIdx < questions.length) {
            init();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        let score = 0;
        const reviewList = document.getElementById('review-list');
        reviewList.innerHTML = '<h3>Работа над ошибками:</h3>';

        questions.forEach((q, i) => {
            const isCorrect = userAnswers[i] === q.c;
            if (isCorrect) score++;

            const div = document.createElement('div');
            div.className = `review-item ${isCorrect ? 'correct-review' : 'wrong-review'}`;
            div.innerHTML = `
                <div class="review-q">${i + 1}. ${q.q}</div>
                <div class="review-info">
                    ${isCorrect ? '<b>Верно!</b>' : `<b>Ошибка.</b> Ваш ответ: ${q.a[userAnswers[i]]}. <br>Правильно: ${q.a[q.c]}`}
                </div>
            `;
            reviewList.appendChild(div);
        });

        document.getElementById('final-score').textContent = `${score} / ${questions.length}`;
        document.getElementById('rank-msg').textContent = score === questions.length ? "Блестяще! Вы настоящий знаток Гоголя." : "Есть над чем поработать!";
    }

    init();
</script>

</body>
</html>
