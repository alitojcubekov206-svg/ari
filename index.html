<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>РЕВИЗОР_2077 // ALI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;700&display=swap');

        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00f2ff;
            --neon-yellow: #fcee0a;
            --main-bg: rgba(5, 5, 10, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto', sans-serif;
            color: white;
            /* ФОН: Киберпанк город, дождь, 8k */
            background: url('https://images.unsplash.com/photo-1605142859862-978be7eba909?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            overflow-x: hidden;
        }

        .quiz-container {
            background: var(--main-bg);
            backdrop-filter: blur(15px);
            width: 90%;
            max-width: 600px;
            padding: 40px;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.4);
            border-radius: 0 50px 0 50px;
            position: relative;
            border-right: 10px solid var(--neon-pink);
        }

        .system-tag {
            position: absolute;
            top: -12px;
            left: 30px;
            background: var(--neon-cyan);
            color: black;
            font-family: 'Orbitron', sans-serif;
            padding: 2px 15px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.05);
            margin-bottom: 35px;
        }

        #progress-fill {
            height: 100%;
            background: var(--neon-pink);
            box-shadow: 0 0 20px var(--neon-pink);
            width: 0%;
            transition: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            color: var(--neon-yellow);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
            line-height: 1.5;
            text-shadow: 0 0 5px rgba(252, 238, 10, 0.5);
        }

        .options {
            display: grid;
            gap: 15px;
        }

        .opt-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 18px;
            text-align: left;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            transition: 0.3s;
            clip-path: polygon(0% 0%, 95% 0%, 100% 30%, 100% 100%, 5% 100%, 0% 70%);
        }

        .opt-btn:hover {
            background: var(--neon-cyan);
            color: black;
            box-shadow: 0 0 25px var(--neon-cyan);
            transform: translateX(10px);
        }

        .grade-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 6rem;
            color: var(--neon-pink);
            text-shadow: 0 0 30px var(--neon-pink);
            margin: 10px 0;
        }

        .footer {
            margin-top: 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 12px 30px;
            border-left: 5px solid var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .footer b { color: var(--neon-yellow); }

        .hidden { display: none; }

        .review-box {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 25px;
            text-align: left;
            padding-right: 15px;
            font-size: 0.85rem;
        }

        .review-item {
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid var(--neon-pink);
        }

        .btn-restart {
            margin-top: 30px;
            background: var(--neon-yellow);
            color: black;
            border: none;
            padding: 18px;
            width: 100%;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-restart:hover {
            background: white;
            box-shadow: 0 0 20px white;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-pink); }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="system-tag">ST_ID: ALI_CORE</div>
    
    <div id="game">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <h2 id="q-text">SCANNING_DATA...</h2>
        <div class="options" id="opt-container"></div>
    </div>

    <div id="results" class="hidden" style="text-align: center;">
        <h1 style="font-family:'Orbitron'; color:var(--neon-cyan); margin:0;">UPLOAD_COMPLETE</h1>
        <div class="grade-display" id="grade-num">5</div>
        <p id="grade-desc" style="color: var(--neon-yellow); font-family:'Orbitron';"></p>
        
        <div class="review-box" id="detailed-review"></div>
        
        <button class="btn-restart" onclick="location.reload()">RE-INITIATE_SESSION</button>
    </div>
</div>

<div class="footer">
    ЭТУ РАБОТУ СДЕЛАЛ: <b>АЛИ</b>
</div>

<script>
    const quizData = [
        { q: "СУММА ВЗЯТКИ У ПОЧТМЕЙСТЕРА ШПЕКИНА?", a: ["200 РУБЛЕЙ", "300 РУБЛЕЙ", "400 РУБЛЕЙ", "100 РУБЛЕЙ"], c: 1 },
        { q: "ИМЯ СЛУГИ ХЛЕСТАКОВА?", a: ["ПЕТРУШКА", "СЕЛИФАН", "ОСИП", "ЗАХАР"], c: 2 },
        { q: "ДОНОС ЗЕМЛЯНИКИ: КТО ВОЛЬНОДУМЕЦ?", a: ["ГОРОДНИЧИЙ", "ЛЯПКИН-ТЯПКИН", "ХЛОПОВ", "БОБЧИНСКИЙ"], c: 1 },
        { q: "КТО ПЕРВЫЙ ЗАМЕТИЛ РЕВИЗОРА В ГОСТИНИЦЕ?", a: ["ОСИП", "ТРАКТИРЩИК", "БОБЧИНСКИЙ И ДОБЧИНСКИЙ", "ШПЕКИН"], c: 2 },
        { q: "В ЧЕМ ОБВИНЯЛА ГОРОДНИЧЕГО ПОШЛЕПКИНА?", a: ["В КРАЖЕ", "В НЕЗАКОННОЙ ПЕРЕДАЧЕ МУЖА В СОЛДАТЫ", "В КОРРУПЦИИ", "В ПОРКЕ"], c: 1 },
        { q: "ЦЕНА АРБУЗА В РУБЛЯХ ИЗ ВРАНЬЯ ХЛЕСТАКОВА?", a: ["100 РУБЛЕЙ", "500 РУБЛЕЙ", "700 РУБЛЕЙ", "1000 РУБЛЕЙ"], c: 2 },
        { q: "ИМЯ ДОЧЕРИ ГОРОДНИЧЕГО?", a: ["АННА АНДРЕЕВНА", "МАРЬЯ АНТОНОВНА", "ДАРЬЯ ПЕТРОВНА", "АВДОТЬЯ"], c: 1 },
        { q: "ЧТО ХЛЕСТАКОВ УРОНИЛ ПЕРЕД ЧИНОВНИКАМИ?", a: ["ПЛАТОК", "КАРТУЗ", "ЧИП", "ТРОСТЬ"], c: 0 },
        { q: "ДОЛЖНОСТЬ ЛУКИ ЛУКИЧА ХЛОПОВА?", a: ["ПОЧТМЕЙСТЕР", "СМОТРИТЕЛЬ УЧИЛИЩ", "СУДЬЯ", "ЛЕКАРЬ"], c: 1 },
        { q: "КАК НАЗЫВАЕТСЯ ФИНАЛЬНАЯ СЦЕНА ПЬЕСЫ?", a: ["ТИХАЯ СЦЕНА", "НЕМАЯ СЦЕНА", "ERROR_EXIT", "OFFLINE"], c: 1 }
    ];

    let current = 0;
    let score = 0;
    let userChoices = [];

    function loadQuestion() {
        const item = quizData[current];
        document.getElementById('q-text').textContent = `> ${item.q}`;
        document.getElementById('progress-fill').style.width = `${((current + 1) / 10) * 100}%`;
        const container = document.getElementById('opt-container');
        container.innerHTML = '';
        item.a.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.textContent = `[${idx}] ${opt}`;
            btn.onclick = () => { 
                userChoices.push(idx); 
                if(idx === item.c) score++; 
                current++; 
                if(current < 10) loadQuestion(); 
                else showFinal(); 
            };
            container.appendChild(btn);
        });
    }

    function showFinal() {
        document.getElementById('game').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');
        let grade = 2; let desc = "";
        if (score >= 9) { grade = 5; desc = "LEGENDARY STATUS. ТЫ ЛУЧШИЙ, АЛИ."; }
        else if (score >= 7) { grade = 4; desc = "SYNC COMPLETE. ХОРОШИЙ РЕЗУЛЬТАТ."; }
        else if (score >= 5) { grade = 3; desc = "AVERAGE LEVEL. СРЕДНЯЯ ОЦЕНКА."; }
        else { grade = 2; desc = "SYSTEM FAILURE. ПЕРЕЧИТАЙ КЛАССИКУ."; }
        
        document.getElementById('grade-num').textContent = grade;
        document.getElementById('grade-desc').textContent = desc;
        
        const review = document.getElementById('detailed-review');
        quizData.forEach((q, i) => {
            const ok = userChoices[i] === q.c;
            const div = document.createElement('div');
            div.className = 'review-item';
            div.style.borderLeft = ok ? '4px solid var(--neon-cyan)' : '4px solid var(--neon-pink)';
            div.innerHTML = `[ST-${i+1}] ${ok ? 'PASSED' : 'FAILED'} - ${q.q}`;
            review.appendChild(div);
        });
    }

    loadQuestion();
</script>

</body>
</html>
