<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сложный зачет по «Ревизору»</title>
    <style>
        body {
            background-color: #2c2c2c;
            color: #333;
            font-family: "Georgia", serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }
        #paper {
            background: #f4e4bc;
            max-width: 650px;
            width: 100%;
            padding: 50px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #d2b48c;
            position: relative;
        }
        h2 { border-bottom: 2px dashed #8b4513; padding-bottom: 10px; color: #5d4037; }
        .q-title { font-size: 1.25rem; font-weight: bold; margin-bottom: 20px; line-height: 1.4; }
        .options-grid { display: grid; gap: 15px; }
        .ans-btn {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid #8b4513;
            padding: 15px;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
            transition: 0.3s;
        }
        .ans-btn:hover { background: #8b4513; color: white; }
        #counter { font-style: italic; color: #8b4513; margin-bottom: 5px; }
        .hidden { display: none; }
        .final-score { text-align: center; font-size: 1.4rem; }
    </style>
</head>
<body>

<div id="paper">
    <div id="quiz-space">
        <div id="counter">Статья №1</div>
        <h2 id="header">Проверка на соответствие чину</h2>
        <p class="q-title" id="question-text">Загрузка дела...</p>
        <div class="options-grid" id="options-box"></div>
    </div>

    <div id="result-space" class="hidden">
        <h2>Резолюция</h2>
        <p class="final-score" id="res-text"></p>
        <p id="comment-text" style="line-height: 1.6;"></p>
        <button onclick="location.reload()" style="display:block; margin: 30px auto; padding: 10px 20px; cursor:pointer;">Перечитать рапорт</button>
    </div>
</div>

<script>
    const hardQuestions = [
        {
            q: "Какое блюдо, по словам Хлестакова, привезли ему в кастрюльке прямо из Парижа на пароходе?",
            a: ["Французский фрикасе", "Суп в кастрюльке прямо из Парижа", "Лабардан", "Трюфели под соусом"],
            c: 1
        },
        {
            q: "В каком ведомстве, согласно вранью Хлестакова, он «управляет»?",
            a: ["В Третьем отделении", "В Департаменте юстиции", "В государственном совете", "В каком-то департаменте, где его все знают"],
            c: 3
        },
        {
            q: "Какую фамилию носил полицейский, который, по словам городничего, «для порядка ставит фонари под глазами»?",
            a: ["Держиморда", "Уховертов", "Пуговицын", "Свистунов"],
            c: 0
        },
        {
            q: "Какую сумму составила первая «взятка», которую Хлестаков буквально выудил у Городничего при первой встрече?",
            a: ["Двести рублей", "Четыреста рублей", "Пятьсот рублей", "Шестьсот пятьдесят"],
            c: 1
        },
        {
            q: "С кем Хлестаков сравнивал себя, утверждая, что он «с Пушкиным на дружеской ноге»?",
            a: ["С министром просвещения", "С Николаем I", "Ни с кем, просто хвастался", "С управляющим департамента"],
            c: 2
        },
        {
            q: "Какую странную особенность имел судья Ляпкин-Тяпкин, помимо взяток щенками?",
            a: ["Он прочитал пять или шесть книг и потому был несколько вольнодумен", "Он всегда ходил в расстегнутом вицмундире", "Он не умел писать", "Он верил в привидений"],
            c: 0
        },
        {
            q: "Кто из персонажей пьесы «в некотором роде философ» и «от него всегда отдаёт немного водкою»?",
            a: ["Лекарь Гибнер", "Судья Ляпкин-Тяпкин", "Попечитель богоугодных заведений Земляника", "Почтмейстер Шпекин"],
            c: 1
        },
        {
            q: "Как называлась газета, в которую Хлестаков обещал «прописать» Тряпичкину всех чиновников города?",
            a: ["«Северная пчела»", "«Вестник Европы»", "«Сын отечества»", "В письме не указано название, просто «в газеты»"],
            c: 3
        }
    ];

    let step = 0;
    let points = 0;

    function render() {
        const item = hardQuestions[step];
        document.getElementById('counter').textContent = `Статья №${step + 1}`;
        document.getElementById('question-text').textContent = item.q;
        const box = document.getElementById('options-box');
        box.innerHTML = '';

        item.a.forEach((option, index) => {
            const btn = document.createElement('button');
            btn.className = 'ans-btn';
            btn.textContent = option;
            btn.onclick = () => {
                if(index === item.c) points++;
                step++;
                if(step < hardQuestions.length) render();
                else finish();
            };
            box.appendChild(btn);
        });
    }

    function finish() {
        document.getElementById('quiz-space').classList.add('hidden');
        document.getElementById('result-space').classList.remove('hidden');
        document.getElementById('res-text').textContent = `Верно: ${points} из ${hardQuestions.length}`;
        
        let comment = "";
        if(points === 8) comment = "Поразительно! Вы — настоящий коллежский регистратор. Гоголь бы вами гордился. Вы заметили даже суп из Парижа!";
        else if(points >= 5) comment = "Неплохо, но Хлестаков бы вас все равно обвел вокруг пальца в паре моментов. Вы знаете факты, но путаетесь в чиновничьих интригах.";
        else comment = "Эх, батюшка... Вам бы в уездное училище на переподготовку. Вы приняли Хлестакова за важную птицу, а он — лишь «елистратишка».";
        
        document.getElementById('comment-text').textContent = comment;
    }

    render();
</script>

</body>
</html>
